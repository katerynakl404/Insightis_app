<!doctype html>
<html lang="en" class="">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Insightis · Data Sources (Files)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..900;1,9..40,300..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../kit-theme.css" />
<style>
  /* ===== Page-only layout (NO component restyling) =====
     Mirrors data-sources_connections-landing.html chrome + sidebar so both Sources screens share
     the same surrounding system. All component styling lives in kit-theme.css. */
  .topbar{padding:.375rem 1rem}
  .cl-shell{display:grid;grid-template-columns:16rem 1fr;min-height:calc(100vh - 40px);background:var(--bg);transition:grid-template-columns .2s ease}
  .cl-shell:has(.sbx.is-collapsed){grid-template-columns:3.563rem 1fr}
  .cl-side{background:var(--card);border-right:1px solid var(--border);min-height:calc(100vh - 40px);max-height:calc(100vh - 40px);overflow:hidden;position:sticky;top:40px;display:flex}
  .cl-side .sbx{width:100%;height:100%;border:none;border-radius:0;flex:1}

  /* ===== File preview — right split panel (opens on file click, like prod) =====
     A third grid column holds the panel when open, so the list narrows (true split, not overlay).
     Width is a live var so the panel is resizable via its left-edge grip; default ~28rem (prod-like). */
  /* Third track is `auto` — it sizes to the panel's own width, so resizing sets .dsf-preview width
     (not the grid track). Width isn't transitioned, so the drag applies cleanly (transitioning the
     grid track between 2↔3 tracks was unreliable). Default width ~28rem (prod-like). */
  .cl-shell.has-preview{grid-template-columns:16rem 1fr auto}
  .cl-shell.has-preview:has(.sbx.is-collapsed){grid-template-columns:3.563rem 1fr auto}
  .cl-shell.is-resizing{user-select:none;cursor:col-resize}
  .dsf-preview{display:none;flex-direction:column;background:var(--card);border-left:1px solid var(--border);
    position:sticky;top:40px;min-height:calc(100vh - 40px);max-height:calc(100vh - 40px);overflow:hidden}
  .cl-shell.has-preview .dsf-preview{display:flex;width:28rem}
  /* Left-edge resize grip — straddles the panel border; widens the hit area, subtle brand line on hover/drag */
  .dsf-preview-grip{position:absolute;left:0;top:0;bottom:0;width:9px;transform:translateX(-50%);cursor:col-resize;z-index:3;touch-action:none}
  .dsf-preview-grip::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;transform:translateX(-50%);background:transparent;transition:background var(--motion-fast) var(--motion-ease)}
  .dsf-preview-grip:hover::before,.cl-shell.is-resizing .dsf-preview-grip::before{background:var(--brand-primary)}
  .dsf-preview-head{display:flex;align-items:center;gap:.5rem;padding:.625rem .625rem .625rem 1rem;border-bottom:1px solid var(--border);flex:none}
  .dsf-preview-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:var(--text-14);font-weight:600;color:var(--ink)}
  .dsf-preview-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.625rem;padding:1.5rem;text-align:center;overflow:auto}
  .dsf-preview-ic{width:3.5rem;height:3.5rem;color:var(--ink-inactive);flex:none}
  .dsf-preview-name{font-size:var(--text-14);font-weight:600;color:var(--ink);word-break:break-word;max-width:28ch}
  .dsf-preview-meta{font-size:var(--text-12);color:var(--ink-secondary)}
  /* Previewed row highlight — brand-coloured name (both layouts) */
  .chat-row.is-preview .chat-row-name,.dsf-tbl tbody tr.is-preview .dsft-fname{color:var(--brand-primary)}
  /* Narrow: the panel overlays full-width instead of splitting the grid */
  @media (max-width:1023px){
    .cl-shell.has-preview,.cl-shell.has-preview:has(.sbx.is-collapsed){grid-template-columns:16rem 1fr}
    .cl-shell.has-preview .dsf-preview{position:fixed;inset:40px 0 0 0;z-index:70;border-left:none;width:auto}
    .dsf-preview-grip{display:none} /* full-width overlay on mobile — no resize */
  }

  /* Main column — max-width and alignment identical to Chats Library / Connections pages. */
  .cl-main{position:relative;display:flex;flex-direction:column;width:100%;min-width:0;padding:2.25rem 0 4rem;min-height:calc(100vh - 40px)}
  .cl-page{width:100%;max-width:var(--content-max-width);margin:0 auto;padding:0 2rem;display:flex;flex-direction:column;gap:.75rem}
  .cl-page-title{scroll-margin:5rem;font-weight:500;font-size:1.5rem;line-height:2rem;color:var(--ink);text-align:left;margin:0 0 .25rem}
  @media (min-width:768px){.cl-page-title{font-size:1.875rem;line-height:2.25rem}}
  /* Burger alignment handled globally in kit-theme.css — no per-page rules needed. */

  /* Page head — title only (the Cards/Table view toggle is a demo control in the topbar, not content) */
  .ds-page-head{display:flex;align-items:center;gap:.75rem}
  .ds-page-head .cl-page-title{margin:0}
  /* Section rhythm — flat stack, consistent with the Chats Library page (no filled control band).
     Upload zone (drop), then the library block (meta row + filter chips + list). */
  .ds-page-body{display:flex;flex-direction:column;gap:1rem}
  /* Invisible grouping so the whole library block can be hidden in the empty state. */
  .dsf-library{display:flex;flex-direction:column;gap:.5rem}
  @media(max-width:1023px){.cl-main{padding-top:0}}

  /* Drop zone (.dsf-drop*) is now a kit component in kit-theme.css (states: rest / hover / focus /
     drag-over) — see storybook #dropzone. No page-level override here. */

  /* ===== Source filter — flat chip row below the meta row (bare kit .chip filters in a page
     wrapper, same pattern as the Metrics toolbar). */
  .dsf-filter{display:flex;align-items:center;gap:.375rem}
  /* ===== File type icon — colored square + extension label ===== */
  .dsf-file-ic{width:2rem;height:2rem;border-radius:.375rem;display:inline-flex;align-items:center;
    justify-content:center;font-size:.5625rem;font-weight:700;flex:none;letter-spacing:var(--tracking-label);
    text-transform:uppercase;color:var(--content-on-solid);background:var(--mark-bg,var(--brand-tertiary))}
  .dsf-file-ic.type-csv{--mark-bg:var(--brand-tertiary)}
  .dsf-file-ic.type-xls{--mark-bg:var(--fb-green)}
  .dsf-file-ic.type-xlsx{--mark-bg:var(--fb-green)}

  /* ===== File list — two layouts toggled by the view control ===== */
  .dsf-list{position:relative}
  /* Cards layout — reuses kit .chat-row (container also carries .chat-list for is-selecting/overflow).
     Name flows naturally + ellipsizes when long (kit default). Date sits right next to the name
     (muted, small); the status badge is the sole element anchored to the row's right edge. */
  .dsf-list.is-cards{display:flex;flex-direction:column;gap:.375rem}
  .dsf-card-date{flex:none;font-size:var(--text-12);color:var(--ink-secondary);font-weight:400;white-space:nowrap}
  .dsf-card-status{margin-left:auto;flex:none}
  /* Load-more — centered kit button below the list; collapses out of flow when empty */
  .dsf-more{display:flex;justify-content:center;margin-top:.25rem}
  .dsf-more:empty{display:none}
  .dsf-more-n{font-variant-numeric:tabular-nums;color:var(--ink-inactive);font-weight:500}
  /* Table layout — reuses kit table.tbl */
  .dsf-tbl-wrap{border:1px solid var(--border);border-radius:.5rem;background:var(--card)}
  table.dsf-tbl{margin:0}
  table.dsf-tbl thead th{background:var(--card2)}
  table.dsf-tbl thead th:first-child{border-top-left-radius:.5rem}
  table.dsf-tbl thead th:last-child{border-top-right-radius:.5rem}
  table.dsf-tbl tbody tr:last-child td{border-bottom:none}
  .dsft-name-cell{display:flex;align-items:center;gap:.625rem;min-width:0}
  .dsft-fname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:var(--ink)}
  td.dsft-size,td.dsft-date{color:var(--ink-secondary);font-variant-numeric:tabular-nums;white-space:nowrap}
  th.dsft-cb,td.dsft-cb{width:1px;white-space:nowrap}
  th.dsft-act,td.dsft-act{width:1px;white-space:nowrap;position:relative;text-align:right}
  /* Kebab reveals on row hover / menu open (no .chat-row parent here to trigger the kit reveal) */
  .dsf-tbl .chat-row-more{opacity:0;pointer-events:none}
  .dsf-tbl tbody tr:hover .chat-row-more,
  .dsf-tbl .chat-row-more[aria-expanded="true"],
  .dsf-tbl .chat-row-more:focus-visible{opacity:1;pointer-events:auto}
  @media (max-width:600px){th.dsft-size,td.dsft-size,th.dsft-date,td.dsft-date{display:none}}

  /* ===== Meta / bulk action row =====
     Identical structure to the Chats Library meta-row (see chats-landing.html and kit-theme.css).
     We define only the two new button variants here (download + delete). The delete button
     is a local copy of chats-landing's .meta-row-delete (not in kit-theme.css). */
  .dsf-meta-iconbtn{display:inline-flex;align-items:center;justify-content:center;width:1.5rem;height:1.5rem;
    border-radius:.25rem;background:transparent;border:none;color:var(--ink-secondary);cursor:pointer;
    padding:0;font-family:inherit;flex:none;
    transition:color var(--motion-fast,80ms) var(--motion-ease,ease),
               background-color var(--motion-fast,80ms) var(--motion-ease,ease)}
  .dsf-meta-iconbtn:hover{color:var(--ink-body);background:color-mix(in srgb,var(--brand-primary) 6%,transparent)}
  .dsf-meta-iconbtn:focus-visible{outline:none;box-shadow:var(--shadow-focus-inset)}
  .dsf-meta-iconbtn svg{width:14px;height:14px}
  /* Download button — neutral destructive-style button without red (mirrors .meta-row-delete shape) */
  .dsf-meta-dl,.dsf-meta-del{margin-left:0;display:inline-flex;align-items:center;gap:.375rem;
    font-size:.8125rem;font-weight:500;background:transparent;border:none;cursor:pointer;
    padding:.25rem .5rem;border-radius:.25rem;font-family:inherit;
    transition:background-color var(--motion-fast,80ms) var(--motion-ease,ease)}
  .dsf-meta-dl{color:var(--ink-body)}
  .dsf-meta-del{color:var(--fb-red-text)}
  .dsf-meta-dl svg,.dsf-meta-del svg{width:14px;height:14px;flex:none}
  .dsf-meta-dl:hover{background:color-mix(in srgb,var(--brand-primary) 6%,transparent)}
  .dsf-meta-del:hover{background:color-mix(in srgb,var(--fb-red) 8%,transparent)}
  .dsf-meta-dl:focus-visible{outline:none;box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--focus-ring)}
  .dsf-meta-del:focus-visible{outline:none;box-shadow:0 0 0 2px var(--bg),0 0 0 4px color-mix(in srgb,var(--fb-red) 60%,transparent)}
  .dsf-meta-dl.is-disabled,.dsf-meta-del.is-disabled{color:var(--ink-inactive);cursor:not-allowed;pointer-events:none}
  /* Right-anchor the download+delete pair to the row's far right */
  .dsf-bulk-right{margin-left:auto;display:inline-flex;align-items:center;gap:.25rem}

  /* ===== Floating bulk-action bar (Table view) =====
     Pinned bottom-centre, position:fixed (out of flow) so selecting rows never shifts the table.
     Slides up + fades in on .is-visible. Reuses the .dsf-meta-dl / .dsf-meta-del / .dsf-meta-iconbtn
     button styles from the inline bar. */
  .dsf-floatbar{position:fixed;left:50%;bottom:1.5rem;transform:translateX(-50%) translateY(.5rem);
    display:none;align-items:center;gap:.5rem;background:var(--card);border:1px solid var(--border);
    border-radius:.625rem;box-shadow:var(--shadow-overlay);padding:.375rem .375rem .375rem .875rem;
    z-index:60;opacity:0;
    transition:opacity var(--motion-base) var(--motion-ease),transform var(--motion-base) var(--motion-ease)}
  .dsf-floatbar.is-visible{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
  .dsf-floatbar-count{font-size:var(--text-13);font-weight:500;color:var(--ink-body);white-space:nowrap}
  .dsf-floatbar-sep{width:1px;height:1.25rem;background:var(--border);flex:none}
  .dsf-floatbar-actions{display:inline-flex;align-items:center;gap:.25rem}
  @media (prefers-reduced-motion: reduce){ .dsf-floatbar{transition:opacity var(--motion-fast) var(--motion-ease)} }
  /* Sidebar→drawer is kit-owned at ≤1023px (kit-theme.css) — pages must not redeclare it. */
</style>
</head>

          <!-- Actions / bulk-action bar — sits between the chips and the list -->

          <!-- File list — Cards (.chat-row) or Table (table.tbl); rendered by dsfRender() -->
          <div class="dsf-list is-table" id="dsf-list" aria-label="Uploaded files"></div>
          <!-- Load more — appears when the filtered set exceeds the current page (rendered by dsfRender) -->
          <div class="dsf-more" id="dsf-more"></div>
        </div>

      </div>
    </div>
  </main>

  <!-- File preview — right split panel (opens on file click, like prod); rendered by dsfRenderPreview() -->
  <aside class="dsf-preview" id="dsf-preview" aria-label="File preview"></aside>
</div>

<!-- Floating bulk-action bar — Table view only. Pinned bottom-centre, out of flow, so selecting
     rows never shifts the table. Rendered/toggled by dsfRenderFloatbar(). -->
<div class="dsf-floatbar" id="dsf-floatbar" role="toolbar" aria-label="Bulk file actions"></div>


<script>
  /* Tooltip engine — JS-positioned fixed tooltip, warm-up aware, escapes overflow:hidden. */
  (function(){
    document.documentElement.classList.add('tt-js');
    var ft,showTimer,TIP_DELAY=300;
    function getFt(){
      if(!ft){ft=document.createElement('div');ft.setAttribute('aria-hidden','true');
        ft.style.cssText='position:fixed;z-index:9999;background:var(--ink);color:var(--card);font-size:.75rem;border-radius:6px;padding:4px 8px;pointer-events:none;white-space:nowrap;font-family:inherit;line-height:1.35;opacity:0;transition:opacity .1s;display:none';
        document.body.appendChild(ft);}return ft;
    }
    function show(el){
      var text=el.getAttribute('data-tip');
      /* Collapsed sidebar rail: nav items carry no data-tip — derive the label from the (hidden)
         .lbl or aria-label so each icon tips on hover with the standard delay. When the sidebar is
         expanded the .lbl is visible → skip, so the tooltip never duplicates a visible label. */
      if(!text && (el.classList.contains('sbx-nav-item')||el.classList.contains('sbx-chats-icon'))){
        if(!el.closest('.sbx.is-collapsed')) return;
        var sbLbl=el.querySelector('.lbl');
        text=(sbLbl?sbLbl.textContent:(el.getAttribute('aria-label')||'')).trim();
      }
      if(!text)return;
      var f=getFt(),r=el.getBoundingClientRect();
      f.textContent=text;f.style.display='inline-flex';f.style.opacity='0';
      var tw=f.offsetWidth,th=f.offsetHeight;
      var lx,ty;
      if(el.closest('.sbx.is-collapsed')){
        /* Collapsed sidebar rail → tooltip to the RIGHT of the icon, vertically centred
           (flips to the left edge if the viewport can't fit it on the right). */
        lx=r.right+8; if(lx+tw>window.innerWidth-4) lx=r.left-tw-8;
        ty=Math.max(4,Math.min(r.top+r.height/2-th/2,window.innerHeight-th-4));
      } else {
        lx=Math.max(4,Math.min(r.left+r.width/2-tw/2,window.innerWidth-tw-4));
        ty=r.top-th-5;if(ty<4)ty=r.bottom+5;
      }
      f.style.left=lx+'px';f.style.top=ty+'px';
      f.style.transition='opacity .12s';f.style.opacity='1';
    }
    function hide(){if(ft){ft.style.transition='opacity .1s';ft.style.opacity='0';}clearTimeout(showTimer);}
    /* Always wait TIP_DELAY before showing — no warm-up "instant re-show", so every tooltip has the
       same hover delay (the warm-up made rapid hovers appear instantly, reading as "no delay"). */
    document.addEventListener('mouseover',function(e){
      var el=e.target.closest('[data-tip],.sbx-nav-item,.sbx-chats-icon');if(!el)return;
      clearTimeout(showTimer);showTimer=setTimeout(function(){show(el);},TIP_DELAY);
    },true);
    document.addEventListener('mouseout',function(e){
      var el=e.target.closest('[data-tip],.sbx-nav-item,.sbx-chats-icon');if(!el)return;
      var to=e.relatedTarget;if(to&&to.closest&&to.closest('[data-tip],.sbx-nav-item,.sbx-chats-icon'))return;
      hide();
    },true);
    /* Clicking a tip target (e.g. the ✕ clear-selection button) re-renders / removes it while it's
       still hovered, so no mouseout fires and the tooltip would linger. Hide it on any pointer-down. */
    document.addEventListener('mousedown',function(){hide();},true);
  })();

  /* ===== File data — single source of truth driving the file list, count, and meta row.
     Seeded with 24 rows (> one page) so the "Load more" pagination is demonstrable. ===== */
  var FILE_SEED = [
    ['quarterly-report.csv','csv','artifact','2.4 MB','3d ago'],
    ['customer-data.xlsx','xlsx','uploaded','890 KB','last week'],
    ['sales-metrics.xls','xls','uploaded','1.1 MB','2 weeks ago'],
    ['revenue-forecast.xlsx','xlsx','artifact','1.6 MB','3 weeks ago'],
    ['churn-analysis.csv','csv','artifact','512 KB','last month'],
    ['marketing-spend.xlsx','xlsx','uploaded','2.1 MB','last month'],
    ['user-signups.csv','csv','uploaded','340 KB','last month'],
    ['cohort-retention.xls','xls','artifact','780 KB','2 months ago'],
    ['nps-survey.csv','csv','uploaded','220 KB','2 months ago'],
    ['support-tickets.xlsx','xlsx','uploaded','1.9 MB','2 months ago'],
    ['ad-performance.csv','csv','artifact','610 KB','2 months ago'],
    ['inventory-snapshot.xlsx','xlsx','uploaded','3.2 MB','3 months ago'],
    ['pricing-experiments.csv','csv','artifact','145 KB','3 months ago'],
    ['web-traffic.xls','xls','uploaded','990 KB','3 months ago'],
    ['feature-usage.csv','csv','artifact','830 KB','3 months ago'],
    ['payroll-summary.xlsx','xlsx','uploaded','470 KB','4 months ago'],
    ['vendor-list.csv','csv','uploaded','88 KB','4 months ago'],
    ['budget-2026.xlsx','xlsx','uploaded','1.3 MB','4 months ago'],
    ['lead-scoring.csv','csv','artifact','560 KB','5 months ago'],
    ['region-breakdown.xls','xls','artifact','720 KB','5 months ago'],
    ['email-campaigns.csv','csv','uploaded','410 KB','5 months ago'],
    ['product-catalog.xlsx','xlsx','uploaded','2.7 MB','6 months ago'],
    ['subscription-mrr.csv','csv','artifact','275 KB','6 months ago'],
    ['exit-survey.xlsx','xlsx','uploaded','640 KB','6 months ago'],
  ];
  var FILES = FILE_SEED.map(function(r,i){
    return { id:'f'+(i+1), name:r[0], type:r[1], origin:r[2], size:r[3], date:r[4], selected:false };
  });

  var editMode = false;        /* true = selection mode, checkboxes visible for all rows */
  var currentFilter = 'all';   /* 'all' | 'artifact' | 'uploaded' — source filter chip */
  var viewMode = 'table';      /* 'cards' | 'table' — list layout, switched by the segmented control (table is the default concept) */
  var PAGE_SIZE = 20;          /* rows per page — a "Load more" button reveals the next batch */
  var shownCount = PAGE_SIZE;  /* how many of the filtered rows are currently rendered */
  var previewId = null;        /* id of the file open in the right preview split panel, or null */

  /* Files currently visible under the active source filter — drives the list, count, and selection. */
  function dsfVisible(){
    return currentFilter === 'all' ? FILES : FILES.filter(function(f){ return f.origin === currentFilter; });
  }
  /* Per-origin status badge — Artifact = brand fill, Uploaded = neutral. Label (not colour) carries
     the status, so it reads in any theme and passes 1.4.1. */
  function dsfStatusBadge(origin){
    return origin === 'artifact'
      ? '<span class="badge badge-sm badge-primary">Artifact</span>'
      : '<span class="badge badge-sm badge-secondary">Uploaded</span>';
  }

  /* ===== SVG icons as variables — same pattern as chats-landing.html ===== */
  var KEBAB   = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="6" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="18" r="2"/></svg>';
  var CHECK   = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>';
  var DASH    = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14"/></svg>';
  var CLOSE   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>';
  var TRASH   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
  var DOWNLOAD= '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';

  function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* Row-menu (Download / Delete) markup, shared by both layouts. Text-only items — the kebab
     menus elsewhere in the app (Chats Library, etc.) carry no leading icons. */
  function dsfRowMenu(id){
    return ''
      + '<div class="menu chat-row-menu" role="menu">'
      +   '<div class="mi" role="menuitem" data-action="download" data-id="' + id + '">Download</div>'
      +   '<div class="mi danger" role="menuitem" data-action="delete" data-id="' + id + '">Delete</div>'
      + '</div>';
  }
  function dsfKebab(id){
    return '<button class="chat-row-more" type="button" aria-label="More actions" aria-haspopup="menu" aria-expanded="false" data-action="more" data-id="' + id + '">' + KEBAB + '</button>';
  }

  /* ===== Render file list — dispatches to the active layout, paginated to PAGE_SIZE ===== */
  function dsfRender(){
    var list = document.getElementById('dsf-list');
    var library = document.getElementById('dsf-library');
    var more = document.getElementById('dsf-more');

    /* Hide the whole library block when there are no files at all — only the drop zone remains. */
    if (FILES.length === 0){
      if (library) library.style.display = 'none';
      list.innerHTML = '';
      if (more) more.innerHTML = '';
      dsfRenderFloatbar();
      dsfRenderPreview();
      return;
    }
    if (library) library.style.display = '';

    var vis = dsfVisible();
    var page = vis.slice(0, shownCount);
    if (viewMode === 'table') dsfRenderTable(list, page);
    else dsfRenderCards(list, page);

    /* Load-more control — shown only when more filtered rows exist beyond the current page. */
    if (more){
      var remaining = vis.length - page.length;
      if (remaining > 0){
        more.innerHTML = '<button class="btn btn-secondary btn-sm" type="button" data-action="load-more">Load more <span class="dsf-more-n">' + remaining + '</span></button>';
      } else {
        more.innerHTML = '';
      }
    }

    dsfRenderMeta();
    dsfRenderFloatbar();
    dsfRenderPreview();
    dsfPositionFloatbar(); /* after preview so the list has its final (narrowed) width */
  }

  /* Reposition the floating bar when the layout width changes. */
  window.addEventListener('resize', dsfPositionFloatbar);

  /* Cards layout — reuses kit .chat-row */
  function dsfRenderCards(list, page){
    list.className = 'dsf-list is-cards chat-list';
    list.setAttribute('role', 'list');
    list.innerHTML = page.map(function(f){
      return ''
        + '<div class="chat-row' + (f.selected ? ' is-selected' : '') + (f.id === previewId ? ' is-preview' : '') + '" role="listitem" data-id="' + f.id + '" tabindex="0">'
        +   '<span class="cbx' + (f.selected ? ' on' : '') + '" role="checkbox" aria-checked="' + f.selected + '" tabindex="0" data-action="check" data-id="' + f.id + '">' + (f.selected ? CHECK : '') + '</span>'
        +   '<span class="dsf-file-ic type-' + f.type + '" aria-hidden="true">' + f.type.toUpperCase() + '</span>'
        +   '<span class="chat-row-name">' + escHtml(f.name) + '</span>'
        +   '<span class="dsf-card-date">· ' + escHtml(f.date) + '</span>'
        +   '<span class="dsf-card-status">' + dsfStatusBadge(f.origin) + '</span>'
        +   dsfKebab(f.id)
        +   dsfRowMenu(f.id)
        + '</div>';
    }).join('');
    list.classList.toggle('is-selecting', editMode);
  }

  /* Table layout — reuses kit table.tbl. Columns: [checkbox] · Name · Type · Size · Modified · [kebab] */
  function dsfRenderTable(list, page){
    list.className = 'dsf-list is-table';
    list.setAttribute('role', 'region');
    /* Shared header checkbox — the table's select-all / bulk-selection control (replaces the
       redundant "Select all" link in the meta row). Reflects all / some / none of the visible set. */
    var vis = dsfVisible();
    var allSel = vis.length > 0 && vis.every(function(f){ return f.selected; });
    var someSel = vis.some(function(f){ return f.selected; });
    var headMark = allSel ? CHECK : (someSel ? DASH : '');
    list.innerHTML = ''
      + '<div class="dsf-tbl-wrap"><table class="tbl dsf-tbl">'
      +   '<thead><tr>'
      +     '<th class="dsft-cb"><span class="cbx' + ((allSel || someSel) ? ' on' : '') + '" role="checkbox" aria-checked="' + (allSel ? 'true' : (someSel ? 'mixed' : 'false')) + '" tabindex="0" data-action="select-all-header" aria-label="Select all files">' + headMark + '</span></th>'
      +     '<th>Name</th><th>Type</th>'
      +     '<th class="dsft-size">Size</th><th class="dsft-date">Modified</th>'
      +     '<th class="dsft-act" aria-label="Actions"></th>'
      +   '</tr></thead><tbody>'
      +   page.map(function(f){
            return ''
              + '<tr class="' + (f.selected ? 'is-selected' : '') + (f.id === previewId ? ' is-preview' : '') + '" data-id="' + f.id + '">'
              +   '<td class="dsft-cb"><span class="cbx' + (f.selected ? ' on' : '') + '" role="checkbox" aria-checked="' + f.selected + '" tabindex="0" data-action="check" data-id="' + f.id + '">' + (f.selected ? CHECK : '') + '</span></td>'
              +   '<td><div class="dsft-name-cell"><span class="dsf-file-ic type-' + f.type + '" aria-hidden="true">' + f.type.toUpperCase() + '</span><span class="dsft-fname">' + escHtml(f.name) + '</span></div></td>'
              +   '<td>' + dsfStatusBadge(f.origin) + '</td>'
              +   '<td class="dsft-size">' + escHtml(f.size) + '</td>'
              +   '<td class="dsft-date">' + escHtml(f.date) + '</td>'
              +   '<td class="dsft-act">' + dsfKebab(f.id) + dsfRowMenu(f.id) + '</td>'
              + '</tr>';
          }).join('')
      +   '</tbody></table></div>';
  }

  /* ===== Render meta / bulk action bar =====
     Both views show the file count. Table: count only (its selection actions live in the floating
     bar, so the table never shifts). Cards: "N files · Select all" at rest, ✕ · N selected ·
     Select all | Download · Delete while selecting. */
  function dsfRenderMeta(){
    var meta = document.getElementById('dsf-meta');
    var vis = dsfVisible();
    var totalCount = vis.length;
    var noun = totalCount === 1 ? 'file' : 'files';
    var countHtml = '<span class="meta-row-count">' + totalCount + ' ' + noun + '</span>';
    meta.style.display = '';

    /* Table: persistent file count only — selection count/actions live in the floating bar. */
    if (viewMode === 'table'){ meta.innerHTML = countHtml; return; }

    var selectedCount = vis.filter(function(f){ return f.selected; }).length;

    if (!editMode){
      /* Default: file count + "Select all" entry into selection. */
      meta.innerHTML = countHtml + '<span class="meta-row-actions"><button class="link" type="button" data-action="enter-edit">Select all</button></span>';
      return;
    }

    var allSelected = selectedCount === totalCount;
    meta.innerHTML = ''
      + '<button class="dsf-meta-iconbtn" type="button" data-action="cancel-edit" aria-label="Clear selection" data-tip="Clear selection">' + CLOSE + '</button>'
      + '<span class="meta-row-count">' + selectedCount + ' selected</span>'
      + '<button class="link' + (totalCount === 0 ? ' is-disabled' : '') + '" type="button" data-action="select-all">' + (allSelected ? 'Deselect all' : 'Select all') + '</button>'
      + '<span class="dsf-bulk-right">'
      +   '<button class="dsf-meta-dl' + (selectedCount === 0 ? ' is-disabled' : '') + '" type="button" data-action="download-selected"' + (selectedCount === 0 ? ' aria-disabled="true"' : '') + '>' + DOWNLOAD + 'Download</button>'
      +   '<button class="dsf-meta-del' + (selectedCount === 0 ? ' is-disabled' : '') + '" type="button" data-action="delete-selected"' + (selectedCount === 0 ? ' aria-disabled="true"' : '') + '>' + TRASH + 'Delete</button>'
      + '</span>';
  }

  /* ===== Floating bulk-action bar (Table view) — overlays, so the table never shifts ===== */
  function dsfRenderFloatbar(){
    var fb = document.getElementById('dsf-floatbar');
    if (!fb) return;
    var selectedCount = dsfVisible().filter(function(f){ return f.selected; }).length;
    if (viewMode === 'table' && selectedCount > 0){
      fb.innerHTML = ''
        + '<span class="dsf-floatbar-count">' + selectedCount + ' selected</span>'
        + '<span class="dsf-floatbar-sep"></span>'
        + '<span class="dsf-floatbar-actions">'
        +   '<button class="dsf-meta-dl" type="button" data-action="download-selected">' + DOWNLOAD + 'Download</button>'
        +   '<button class="dsf-meta-del" type="button" data-action="delete-selected">' + TRASH + 'Delete</button>'
        + '</span>'
        + '<span class="dsf-floatbar-sep"></span>'
        + '<button class="dsf-meta-iconbtn" type="button" data-action="cancel-edit" aria-label="Clear selection" data-tip="Clear selection">' + CLOSE + '</button>';
      fb.classList.add('is-visible');
    } else {
      fb.classList.remove('is-visible');
    }
  }
  /* Centre the floating bar over the LIST (not the viewport) — the sidebar + preview panel offset
     the table, so viewport-centring reads as off-centre. Measures #dsf-list's live centre. */
  function dsfPositionFloatbar(){
    var fb = document.getElementById('dsf-floatbar');
    if (!fb || !fb.classList.contains('is-visible')) return;
    var ref = document.getElementById('dsf-list');
    if (!ref) return;
    var r = ref.getBoundingClientRect();
    fb.style.left = Math.round(r.left + r.width / 2) + 'px';
  }

  /* ===== File preview — right split panel (opens on file-row click, like prod) ===== */
  var PREVIEW_DOC = '<svg class="dsf-preview-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
  function dsfRenderPreview(){
    var panel = document.getElementById('dsf-preview');
    var shell = document.querySelector('.cl-shell');
    if (!panel || !shell) return;
    var f = previewId ? FILES.find(function(x){ return x.id === previewId; }) : null;
    if (!f){ shell.classList.remove('has-preview'); panel.style.width = ''; panel.innerHTML = ''; return; }
    shell.classList.add('has-preview');
    panel.innerHTML = ''
      + '<div class="dsf-preview-grip" aria-hidden="true"></div>'
      + '<div class="dsf-preview-head">'
      +   '<span class="dsf-preview-title">' + escHtml(f.name) + '</span>'
      +   '<button class="dsf-meta-iconbtn" type="button" data-action="download" data-id="' + f.id + '" aria-label="Download" data-tip="Download">' + DOWNLOAD + '</button>'
      +   '<button class="dsf-meta-iconbtn" type="button" data-action="close-preview" aria-label="Close preview" data-tip="Close">' + CLOSE + '</button>'
      + '</div>'
      + '<div class="dsf-preview-body">'
      +   PREVIEW_DOC
      +   '<div class="dsf-preview-name">' + escHtml(f.name) + '</div>'
      +   '<div class="dsf-preview-meta">' + escHtml(f.size) + ' · ' + (f.origin === 'artifact' ? 'Artifact' : 'Uploaded') + ' · ' + escHtml(f.date) + '</div>'
      + '</div>';
  }
  /* Resizable preview — drag the left-edge grip; the panel hugs the right edge, so its width is
     (viewport right − pointer x), clamped. Stored on the shell as --dsf-preview-w (px). */
  (function(){
    var shell = document.querySelector('.cl-shell');
    document.addEventListener('pointerdown', function(e){
      if (!e.target.closest('.dsf-preview-grip')) return;
      e.preventDefault();
      shell.classList.add('is-resizing');
      var panel = document.getElementById('dsf-preview');
      function move(ev){
        var w = Math.max(320, Math.min(window.innerWidth - ev.clientX, Math.min(720, window.innerWidth - 360)));
        if (panel) panel.style.width = w + 'px';
      }
      function up(){ shell.classList.remove('is-resizing'); document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); }
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
    });
  })();
  function dsfOpenPreview(id){ previewId = id; dsfRender(); }
  function dsfClosePreview(){ if (previewId === null) return; previewId = null; dsfRender(); }

  /* ===== Click delegation — handles all interactive elements in the expected section ===== */
  document.addEventListener('click', function(e){
    var action = (e.target.closest('[data-action]') || {}).getAttribute ? e.target.closest('[data-action]').getAttribute('data-action') : null;
    var id = e.target.closest('[data-id]') ? e.target.closest('[data-id]').getAttribute('data-id') : null;

    /* Kebab — toggle one menu open, close all others */
    if (action === 'more'){
      e.stopPropagation();
      var btn = e.target.closest('[data-action="more"]');
      var willOpen = btn.getAttribute('aria-expanded') !== 'true';
      document.querySelectorAll('.chat-row-more[aria-expanded="true"]').forEach(function(b){ b.setAttribute('aria-expanded','false'); });
      if (willOpen) btn.setAttribute('aria-expanded','true');
      return;
    }
    /* Click outside any open menu — close all */
    if (!e.target.closest('.chat-row-menu') && !e.target.closest('[data-action="more"]')){
      document.querySelectorAll('.chat-row-more[aria-expanded="true"]').forEach(function(b){ b.setAttribute('aria-expanded','false'); });
    }

    if (action === 'check' && id){
      var f = FILES.find(function(x){ return x.id === id; });
      if (f){ f.selected = !f.selected; editMode = true; }
      dsfRender(); return;
    }
    if (action === 'set-view'){
      var v = e.target.closest('[data-view]').getAttribute('data-view');
      if (v === viewMode) return;
      viewMode = v;
      document.querySelectorAll('.ds-view-toggle .segctrl-btn').forEach(function(b){
        var on = b.getAttribute('data-view') === v;
        b.classList.toggle('is-active', on);
        b.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      document.querySelectorAll('.chat-row-more[aria-expanded="true"]').forEach(function(b){ b.setAttribute('aria-expanded','false'); });
      dsfRender(); return;
    }
    if (action === 'load-more'){
      shownCount += PAGE_SIZE;
      dsfRender(); return;
    }
    if (action === 'filter'){
      var fil = e.target.closest('[data-filter]').getAttribute('data-filter');
      currentFilter = fil;
      /* Fresh view: reset pagination and the bulk-selection context when the visible set changes,
         so a hidden selected file from a prior filter can't be silently bulk-actioned. */
      shownCount = PAGE_SIZE;
      editMode = false;
      FILES.forEach(function(f){ f.selected = false; });
      document.querySelectorAll('#dsf-filter .chip').forEach(function(c){
        var on = c.getAttribute('data-filter') === fil;
        c.classList.toggle('is-active', on);
        c.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
      dsfRender(); return;
    }
    if (action === 'enter-edit'){
      editMode = true;
      dsfVisible().forEach(function(f){ f.selected = true; });
      dsfRender(); return;
    }
    if (action === 'cancel-edit'){
      editMode = false;
      FILES.forEach(function(f){ f.selected = false; });
      dsfRender(); return;
    }
    if (action === 'select-all'){
      var vis = dsfVisible();
      var all = vis.every(function(f){ return f.selected; });
      vis.forEach(function(f){ f.selected = !all; });
      dsfRender(); return;
    }
    /* Table header checkbox — shared select-all that drives bulk selection. All selected → clears;
       otherwise selects all visible and enters selection mode (revealing the bulk actions). */
    if (action === 'select-all-header'){
      var visH = dsfVisible();
      var allH = visH.length > 0 && visH.every(function(f){ return f.selected; });
      visH.forEach(function(f){ f.selected = !allH; });
      editMode = !allH;
      dsfRender(); return;
    }
    if (action === 'delete' && id){
      document.querySelectorAll('.chat-row-more[aria-expanded="true"]').forEach(function(b){ b.setAttribute('aria-expanded','false'); });
      FILES = FILES.filter(function(f){ return f.id !== id; });
      if (FILES.filter(function(f){ return f.selected; }).length === 0) editMode = false;
      dsfRender(); return;
    }
    if (action === 'delete-selected'){
      FILES = FILES.filter(function(f){ return !f.selected; });
      editMode = false;
      dsfRender(); return;
    }
    if (action === 'download'){ return; } /* demo no-op */
    if (action === 'download-selected'){ return; } /* demo no-op */
    if (action === 'close-preview'){ dsfClosePreview(); return; }

    /* Row body click (not on the checkbox / kebab / menu) → open the file preview panel. */
    var rowEl = e.target.closest('.chat-row[data-id], tr[data-id]');
    if (rowEl && !action && !e.target.closest('.chat-row-menu')){
      var pid = rowEl.getAttribute('data-id');
      if (FILES.some(function(x){ return x.id === pid; })) dsfOpenPreview(pid);
      return;
    }
  });

  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape'){
      var hadMenu = document.querySelector('.chat-row-more[aria-expanded="true"]');
      document.querySelectorAll('.chat-row-more[aria-expanded="true"]').forEach(function(b){ b.setAttribute('aria-expanded','false'); });
      if (!hadMenu) dsfClosePreview();
    }
  });

  /* ===== Drop zone + browse ===== */
  function dsfBrowseFiles(){
    /* Demo: simulate adding a new file */
    var names = ['q2-report.csv','new-customers.xlsx','budget-2026.xls','pipeline.csv'];
    var types = ['csv','xlsx','xls','csv'];
    var sizes = ['3.1 MB','1.2 MB','456 KB','780 KB'];
    var idx = FILES.length % names.length;
    var newId = 'f' + (FILES.length + 10);
    FILES.push({ id:newId, name:names[idx], type:types[idx], origin:'uploaded', size:sizes[idx], date:'just now', selected:false });
    dsfRender();
  }

  function dsfHandleDrop(e){
    /* Demo: add each dropped filename as a new row */
    var dropped = e.dataTransfer && e.dataTransfer.files ? e.dataTransfer.files : [];
    for (var i = 0; i < dropped.length; i++){
      var fname = dropped[i].name;
      var ext = (fname.split('.').pop() || '').toLowerCase();
      var type = ['csv','xls','xlsx'].indexOf(ext) !== -1 ? ext : 'other';
      var size = dropped[i].size ? (dropped[i].size / 1024 / 1024).toFixed(1) + ' MB' : '—';
      FILES.push({ id:'fd' + i, name:fname, type:type, origin:'uploaded', size:size, date:'just now', selected:false });
    }
    dsfRender();
  }

  /* ===== Sidebar collapse ===== */
  function dsfToggleSbxCollapse(){
    if(window.innerWidth<=1023){document.documentElement.classList.remove('side-open');return}
    var sbx = document.querySelector('.cl-side .sbx');
    if (sbx) sbx.classList.toggle('is-collapsed');
    var btn = document.querySelector('.sbx-collapse');
    if(btn) btn.setAttribute('data-tip', sbx && sbx.classList.contains('is-collapsed') ? 'Expand' : 'Collapse');
  }

  /* Initial render */
  dsfRender();

  /* Sidebar footer popovers — same recipe used on chats-landing / chat-landing / data-sources_connections.
     clTogglePop opens one popover at a time; outside-click handler dismisses the open one. */
  /* Account popover items open the user-profile modal on the matching tab */
  document.addEventListener('click', function(e){
    var acctItem = e.target.closest('#sbx-pop-account .sbx-pop-item');
    if(!acctItem) return;
    var acctMap = {'My account':'my-account','Manage plan':'manage-plan','Billing':'billing','Balance':'balance','Leave feedback':'leave-feedback'};
    var acctSec = acctMap[acctItem.textContent.trim()];
    if(acctSec) window.location.href = 'user_profile-modal.html?section=' + acctSec;
  });
  function clTogglePop(id){
    var pop = document.getElementById(id);
    if(!pop) return;
    var willOpen = !pop.classList.contains('is-open');
    document.querySelectorAll('.sbx-pop.is-open').forEach(function(p){
      p.classList.remove('is-open');
      var t = document.querySelector('[aria-controls="'+p.id+'"]');
      if(t) t.setAttribute('aria-expanded','false');
    });
    if(willOpen){
      pop.classList.add('is-open');
      var trigger = document.querySelector('[aria-controls="'+id+'"]');
      if(trigger) trigger.setAttribute('aria-expanded','true');
    }
  }
  document.addEventListener('click', function(e){
    if (e.target.closest('.sbx-pop') || e.target.closest('[data-popover-target]')) return;
    document.querySelectorAll('.sbx-pop.is-open').forEach(function(p){
      p.classList.remove('is-open');
      var t = document.querySelector('[aria-controls="'+p.id+'"]');
      if (t) t.setAttribute('aria-expanded','false');
    });
  });
</script>
<script>
/* Sidebar nav — wire each .sbx-nav-item to its destination page. Active row and the
   current page are skipped so there are no self-reloads. Pages live together in this
   directory so bare filenames work as relative targets. */
(function(){
  var navMap = {
    'New Chat': 'chat-landing.html',
    'Data Sources':  '../approved/data-sources_connections-landing.html',
    'Metrics':  '../approved/metrics-landing.html',
    'Files':    'data-sources_files-landing.html'
  };
  // Mobile/tablet hamburger — opens the sidebar drawer overlay.
  window.clOpenSidebar = function(){
    document.documentElement.classList.add('side-open');
    var sbx = document.querySelector('.cl-side .sbx');
    if(sbx) sbx.classList.remove('is-collapsed');
  };
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && document.documentElement.classList.contains('side-open')){
      document.documentElement.classList.remove('side-open');
    }
  });
  (function(){
    function apply(){ if(window.innerWidth >= 1024) document.documentElement.classList.remove('side-open'); }
    window.addEventListener('resize', apply); apply();
  })();
  var current = location.pathname.split('/').pop();
  document.querySelectorAll('.sbx-nav .sbx-nav-item').forEach(function(btn){
    var lbl = btn.querySelector('.lbl');
    if (!lbl) return;
    var dest = navMap[lbl.textContent.trim()];
    if (!dest || dest === current) return;
    btn.addEventListener('click', function(e){
      if (btn.classList.contains('active')) return;
      e.preventDefault();
      window.location.href = dest;
    });
  });
})();

</script>

(function(){
  var main=document.querySelector('.cl-main');
  if(!main)return;
  function upd(){main.classList.toggle('is-scrolled',(window.scrollY||main.scrollTop)>60);}
  window.addEventListener('scroll',upd,{passive:true});
  main.addEventListener('scroll',upd,{passive:true});
  upd();
})();
</script>

});
