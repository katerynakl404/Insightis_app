    <radialGradient id="s1g-rim" cx="0.5" cy="0" r="0.5">
      <stop offset="0" stop-color="#6EE7B7" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#6EE7B7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s1g-shadow" cx="0.5" cy="1" r="0.63">
