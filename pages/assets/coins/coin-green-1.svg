<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Style 1 — Flat coin, Green -->
  <defs>
    <radialGradient id="s1g-face" cx="0.45" cy="0.35" r="0.95">
      <stop offset="0"    stop-color="#A0F0D5"/>
      <stop offset="0.45" stop-color="#3DB88A"/>
      <stop offset="0.85" stop-color="#1D8865"/>
      <stop offset="1"    stop-color="#0E4A38"/>
