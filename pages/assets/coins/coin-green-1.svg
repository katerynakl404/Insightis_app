    <ellipse cx="100" cy="96" rx="84" ry="84" fill="url(#s1g-shadow)"/>
  </g>
  <ellipse cx="100" cy="96" rx="78" ry="78" fill="none" stroke="#01140F" stroke-width="1.1" stroke-opacity="0.55"/>

