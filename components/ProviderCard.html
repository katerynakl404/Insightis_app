<!--
  ProviderCard — 3-col grid card for a data provider. Elevation-lift hover.
  CSS: pages/kit-theme.css → .prov-card family, --shadow-lift-hover
  Storybook: insightis-preview-kit.html #prov-card
  Page: pages/concept/metrics-landing.html (empty state grid)

  Variants:
    connected   — shows badge + "Manage" button
    not-connected — shows "Not connected" + "Connect" button
    is-browse   — ghost/dashed browse-all card (last cell)
-->

<!-- Connected -->
<div class="prov-card" data-category="Engineering">
  <div class="prov-card-head">
    <div class="prov-ic-w">
      <img src="https://cdn.simpleicons.org/jira" alt="" loading="lazy">
    </div>
    <div class="prov-card-info">
      <span class="prov-card-name">Jira Software Cloud</span>
      <div class="prov-card-status">
        <span class="badge badge-success badge-sm">Connected</span>
      </div>
    </div>
  </div>
  <hr class="prov-card-divider">
  <div>
    <p class="prov-card-metrics-label">Preview Metrics</p>
    <div style="display:flex;flex-wrap:wrap;gap:.25rem">
      <button class="chip-meta" type="button">Issues closed<svg class="chip-meta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg></button>
      <button class="chip-meta" type="button">Sprint velocity<svg class="chip-meta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg></button>
    </div>
  </div>
  <div class="prov-card-footer">
    <button class="btn btn-sm btn-outline">Manage</button>
  </div>
</div>

<!-- Not connected -->
<div class="prov-card" data-category="Engineering">
  <div class="prov-card-head">
    <div class="prov-ic-w">
      <img src="https://cdn.simpleicons.org/github/000000" alt="" loading="lazy" class="dark-invert">
    </div>
    <div class="prov-card-info">
      <span class="prov-card-name">GitHub</span>
      <div class="prov-card-status">
        <span class="prov-card-dot"></span>
        <span class="prov-card-status-text">Not connected</span>
      </div>
    </div>
  </div>
  <hr class="prov-card-divider">
  <div>
    <p class="prov-card-metrics-label">Preview Metrics</p>
    <div style="display:flex;flex-wrap:wrap;gap:.25rem">
      <button class="chip-meta" type="button">PRs merged<svg class="chip-meta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg></button>
      <button class="chip-meta" type="button">Commits<svg class="chip-meta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg></button>
    </div>
  </div>
  <div class="prov-card-footer">
    <button class="btn btn-sm btn-primary">Connect</button>
  </div>
</div>

<!-- Browse-all (ghost/dashed) -->
<div class="prov-card is-browse" role="button" tabindex="0">
  <div class="prov-card-browse-ic">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>
    </svg>
  </div>
  <p class="prov-card-browse-label">Explore more providers</p>
  <p class="prov-card-browse-sub">200+ integrations available to connect</p>
</div>
