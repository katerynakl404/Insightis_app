<!--
  Card skeleton — loading state.
  Mirrors: current/Card.md · changes/Card.md
  Base box from: pages/kit-theme.css → .card-c
  Repeats: 1 card
-->
<div class="sk-skel">
  <div class="card-c" aria-hidden="true">
    <!-- CardHeader: title + description -->
    <div style="display:flex;flex-direction:column;gap:.375rem">
      <span class="skel shimmer r-sm" style="display:block;width:9rem;height:1rem"></span>
      <span class="skel shimmer r-sm" style="display:block;width:12rem;height:.875rem"></span>
    </div>
    <!-- CardContent: body lines -->
    <div style="display:flex;flex-direction:column;gap:.5rem">
      <span class="skel shimmer r-sm" style="display:block;width:100%;height:.875rem"></span>
      <span class="skel shimmer r-sm" style="display:block;width:85%;height:.875rem"></span>
      <span class="skel shimmer r-sm" style="display:block;width:60%;height:.875rem"></span>
    </div>
    <!-- CardFooter: action buttons -->
    <div class="c-foot">
      <span class="skel shimmer r-lg" style="display:block;width:5rem;height:2rem"></span>
      <span class="skel shimmer r-lg" style="display:block;width:5rem;height:2rem"></span>
    </div>
  </div>
</div>
