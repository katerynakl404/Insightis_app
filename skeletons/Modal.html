<!--
  Modal skeleton — loading state.
  Mirrors: components/Modal.html · current/Modal.md · changes/Modal.md
  Base box from: pages/kit-theme.css → .dlg
  Repeats: 1 dialog — title line + 4 body lines + 2 footer buttons (match prod default).
  Notes: reuses live .dlg shell so footprint matches prod (border 1px, radius .875rem,
  flex column). .dlg-hdr padding .875rem 1.25rem .5rem; title box ~9rem × 1.75rem line.
  .dlg-step padding 1.25rem gap 1rem → 4 body lines. .dlg-ftr right-aligned, gap .5rem,
  two btn-sm-sized boxes (height 2rem). .dlg-overlay scrim is omitted (skeleton renders
  inline in the swap pair, not behind a real scrim). Example shell size 480×580 as in
  storybook "Kit structure".
-->
<div class="sk-skel">
  <div class="dlg" style="width:480px;height:580px">
    <!-- header: title line + close-button square -->
    <div class="dlg-hdr">
      <span class="skel shimmer r-sm" style="flex:1;height:1.25rem;max-width:14rem"></span>
      <span class="skel shimmer r-lg" style="width:2rem;height:2rem;flex:none"></span>
    </div>
    <!-- body: 4 lines -->
    <div class="dlg-body">
      <div class="dlg-step">
        <span class="skel shimmer r-sm" style="display:block;width:100%;height:.875rem"></span>
        <span class="skel shimmer r-sm" style="display:block;width:92%;height:.875rem"></span>
        <span class="skel shimmer r-sm" style="display:block;width:96%;height:.875rem"></span>
        <span class="skel shimmer r-sm" style="display:block;width:60%;height:.875rem"></span>
      </div>
    </div>
    <!-- footer: Cancel + confirm buttons (btn-sm, height 2rem) -->
    <div class="dlg-ftr">
      <span class="skel shimmer r-lg" style="width:5rem;height:2rem"></span>
      <span class="skel shimmer r-lg" style="width:5rem;height:2rem"></span>
    </div>
  </div>
</div>
