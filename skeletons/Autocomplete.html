<!--
  Autocomplete skeleton — loading state (isLoading listbox).
  Mirrors: components/Autocomplete.html · current/Autocomplete.md
  Base box from: pages/kit-theme.css → .acpl (280px) / .acpl-ctrl (min-h 40px) / .acpl-list (open menu)
  Repeats: control row + 3 option placeholders (match prod default)
-->
<div class="sk-skel">
  <div class="acpl is-open" aria-hidden="true">
    <span class="acpl-lbl"><span class="skel shimmer r-sm" style="display:inline-block;width:5rem;height:.75rem"></span></span>
    <div class="acpl-ctrl">
      <span class="skel shimmer r-sm" style="width:9rem;height:1.5rem"></span>
      <span class="acpl-end">
        <span class="skel shimmer r-sm" style="width:16px;height:16px"></span>
      </span>
    </div>
    <div class="acpl-list">
      <div class="acpl-opt"><span class="skel shimmer r-sm" style="display:block;width:10rem;height:.875rem"></span></div>
      <div class="acpl-opt"><span class="skel shimmer r-sm" style="display:block;width:7.5rem;height:.875rem"></span></div>
      <div class="acpl-opt"><span class="skel shimmer r-sm" style="display:block;width:9rem;height:.875rem"></span></div>
    </div>
  </div>
</div>
