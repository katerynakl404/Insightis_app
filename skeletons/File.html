-->
<div class="sk-skel">

  <!-- file row 1 -->
  <div class="file" style="margin-bottom:8px" aria-hidden="true">

      <span class="skel shimmer r-sm" style="width:24px;height:24px;flex:none"></span>

      </div>
    </div>
    <div class="file-r">
      <span class="skel shimmer r-full" style="width:14px;height:14px"></span>
    </div>
  </div>

  <!-- file row 2 -->
