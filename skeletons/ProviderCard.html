<!--
  ProviderCard skeleton — loading state.
  Mirrors: components/ProviderCard.html
  Base box from: pages/kit-theme.css → .prov-card
  Repeats: 3 cards (match prod empty-state grid)
-->
<div class="sk-skel">
  <div class="prov-card-grid">

    <!-- card 1 -->
    <div class="prov-card" aria-hidden="true">
      <div class="prov-card-head">
        <span class="skel shimmer r-lg prov-ic-w" style="display:block"></span>
        <div class="prov-card-info">
          <span class="skel shimmer r-sm" style="width:9rem;height:.875rem;margin-bottom:.375rem"></span>
          <span class="skel shimmer r-full" style="width:5.5rem;height:.875rem"></span>
        </div>
      </div>
      <div>
        <div style="display:flex;flex-wrap:wrap;gap:.25rem">
          <span class="skel shimmer r-lg" style="width:5.5rem;height:1.3125rem"></span>
          <span class="skel shimmer r-lg" style="width:6.5rem;height:1.3125rem"></span>
        </div>
      </div>
      <div class="prov-card-footer">
        <span class="skel shimmer r-lg" style="display:block;width:100%;height:2rem"></span>
      </div>
    </div>

    <!-- card 2 -->
    <div class="prov-card" aria-hidden="true">
      <div class="prov-card-head">
        <span class="skel shimmer r-lg prov-ic-w" style="display:block"></span>
        <div class="prov-card-info">
          <span class="skel shimmer r-sm" style="width:7.5rem;height:.875rem;margin-bottom:.375rem"></span>
          <span class="skel shimmer r-full" style="width:6rem;height:.875rem"></span>
        </div>
      </div>
      <div>
        <div style="display:flex;flex-wrap:wrap;gap:.25rem">
          <span class="skel shimmer r-lg" style="width:6rem;height:1.3125rem"></span>
          <span class="skel shimmer r-lg" style="width:5rem;height:1.3125rem"></span>
        </div>
      </div>
      <div class="prov-card-footer">
        <span class="skel shimmer r-lg" style="display:block;width:100%;height:2rem"></span>
      </div>
    </div>

    <!-- card 3 -->
    <div class="prov-card" aria-hidden="true">
      <div class="prov-card-head">
        <span class="skel shimmer r-lg prov-ic-w" style="display:block"></span>
        <div class="prov-card-info">
          <span class="skel shimmer r-sm" style="width:8.5rem;height:.875rem;margin-bottom:.375rem"></span>

        </div>
      </div>
      <div class="prov-card-footer">
        <span class="skel shimmer r-lg" style="display:block;width:100%;height:2rem"></span>
      </div>
    </div>

  </div>
</div>
