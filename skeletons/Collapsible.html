<!--
  Collapsible skeleton — loading state.
  Mirrors: current/Collapsible.md · changes/Collapsible.md
  Base box from: pages/kit-theme.css → .clps / .clps-trig / .clps-cnt
  Repeats: 1 collapsible (open)
-->
<div class="sk-skel">
  <div class="clps" data-state="open" aria-hidden="true">
    <!-- trigger: label + chevron -->
    <div class="clps-trig">
      <span class="skel shimmer r-sm" style="width:8rem;height:.875rem"></span>
      <span class="skel shimmer r-sm clps-chev" style="width:.875rem;height:.875rem"></span>
    </div>
    <!-- content -->
    <div class="clps-cnt">
      <span class="skel shimmer r-sm" style="display:block;width:100%;height:.875rem;margin-bottom:.375rem"></span>
      <span class="skel shimmer r-sm" style="display:block;width:65%;height:.875rem"></span>
    </div>
  </div>
</div>
